<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TK</title>
    <link rel="stylesheet" href="css/riwayatPendidikan.css">
    <link rel="shortcut icon" href="img/logo.png" type="image/logo">
</head>
<body>
    <div class="container">
        <div class="head">
            <div class="isiHead">
                TK
            </div>
            <div class="kosong">

            </div>
        </div>

        <div class="content">
            <div class="foto">
                <img src="img/foto TK.jpeg" alt="Profil">
            </div>

            <div class="kata">
                <div class="judul">
                    MAX'S LEARNING CENTRE
                </div>

                <div class="periode">
                    2012- 2014
                </div>

                <div class="isi">
                    Saat TK saya mempelajari membaca, menulis, menghitung. Saya juga mengikuti kegiatan berupa balet, dan juga saya mempelajari bahasa inggris.
                    <br>
                    Hal menyenangkan terjadi disini membentuk memori masa kecil yang cukup untuk membuat diri tersenyum.
                </div>
            </div>

            

            <div class="button">
                <a href="index.html" onclick="goPage(event)">EXIT</a>
            </div>
        </div>
    </div>
</body>
</html>

<script>
window.onload = () => {
    document.body.classList.add("slide-in");

    setTimeout(() => {
        document.body.classList.remove("slide-in");
    }, 10);
};

function goPage(e) {
    e.preventDefault();

    document.body.classList.add("slide-down");

    setTimeout(() => {
        window.location = e.target.href;
    }, 500);
}
</script>
